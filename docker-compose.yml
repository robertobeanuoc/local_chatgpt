version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: local_chatgpt_app:latest
    restart: unless-stopped
    expose:
      - "6060"
    ports:
      - "6060:6060"
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG:-False}
      - PORT=${PORT:-6060}
      - HOST=${HOST:-0.0.0.0}
      - SESSION_FILE_DIR=${SESSION_FILE_DIR:-/tmp/flask_session}
    volumes:
      - ./src/flask_chatgpt_app:/flask_chatgpt_app:ro
      - ./src/flask_chatgpt_app/uploads:/flask_chatgpt_app/uploads
      - flask_session:/tmp/flask_session
    working_dir: /flask_chatgpt_app
    command: ["python", "run.py"]

volumes:
  flask_session:
